<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>ZICTA AI Host — Photoreal (LiveAvatar)</title>
<style>
  * { box-sizing: border-box; margin: 0; }
  html, body { height: 100%; overflow: hidden; background: #06101f; color: #fff;
    font-family: -apple-system, "Segoe UI", Roboto, system-ui, sans-serif; }
  #bg { position: fixed; inset: 0; z-index: 0;
    background: linear-gradient(125deg, #071a33, #0e7c66, #123a8a, #5b2a86, #071a33);
    background-size: 320% 320%; animation: grad 28s ease-in-out infinite; }
  @keyframes grad { 0%{background-position:0% 50%} 25%{background-position:60% 20%}
    50%{background-position:100% 50%} 75%{background-position:40% 80%} 100%{background-position:0% 50%} }
  /* vertical (9:16) embed centered; fills height on a portrait booth screen */
  #frame { position: fixed; top: 0; bottom: 0; left: 50%; transform: translateX(-50%);
    height: 100vh; width: 100vh; max-width: 100vw; border: 0; z-index: 1; background: transparent; }
  body.horizontal #frame { width: 100vw; height: 100vh; }
  #brand { position: fixed; top: 22px; left: 26px; font-size: 19px; font-weight: 700; opacity: .9;
    text-shadow: 0 2px 14px rgba(0,0,0,.85); z-index: 5; pointer-events: none; }
  #brand small { display: block; font-weight: 400; font-size: 12px; opacity: .65; }
  #overlay { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 18px; background: rgba(6,16,31,.94); z-index: 20; font-size: 18px;
    text-align: center; padding: 32px; }
  .spinner { width: 46px; height: 46px; border: 3px solid #284; border-top-color: #18c29c;
    border-radius: 50%; animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  #overlay .msg { max-width: 580px; line-height: 1.55; }
  #overlay code { background: #11223a; padding: 2px 7px; border-radius: 5px; font-size: 14px; }
  #overlay a { color: #4fd1b0; }
</style>
</head>
<body>
  <div id="bg"></div>
  <iframe id="frame" allow="microphone; camera; autoplay; clipboard-write; display-capture" allowfullscreen></iframe>
  <div id="brand">ZICTA AI<small id="brandsub">Photoreal Host</small></div>
  <div id="overlay"><div class="spinner"></div><div class="msg" id="msg">Connecting to the photoreal avatar…</div></div>

<script>
const overlay = document.getElementById("overlay");
const msg = document.getElementById("msg");
const frame = document.getElementById("frame");
function showMsg(html, spin) {
  overlay.innerHTML = (spin ? '<div class="spinner"></div>' : "") + '<div class="msg">' + html + "</div>";
  overlay.style.display = "flex";
}
(async function boot() {
  let cfg = {};
  try { cfg = await (await fetch("/api/config")).json(); } catch {}
  document.getElementById("brandsub").textContent = cfg.agentName || "Photoreal Host";
  if ((cfg.liveavatarOrientation || "vertical") === "horizontal") document.body.classList.add("horizontal");

  if (!cfg.hasLiveAvatar) {
    return showMsg('Photoreal mode needs a <b>LiveAvatar</b> key.<br><br>' +
      'HeyGen retired its old streaming API — get a new key at <a href="https://app.liveavatar.com/developers" target="_blank">app.liveavatar.com/developers</a> ' +
      '(first login to <code>app.liveavatar.com</code> copies your HeyGen avatars and gives a 30-day trial).<br><br>' +
      'Put it in <code>config.json</code> as <code>liveavatarApiKey</code>, restart, and refresh.<br><br>' +
      'Or use the free 3D avatar at <a href="/avatar3d.html">/avatar3d.html</a>.', false);
  }

  try {
    const r = await (await fetch("/api/embed", { method: "POST" })).json();
    if (!r.url) throw new Error(r.error || "no embed url returned");
    frame.addEventListener("load", () => { overlay.style.display = "none"; });
    frame.src = r.url;
    // safety: hide overlay shortly after in case the load event is suppressed cross-origin
    setTimeout(() => { overlay.style.display = "none"; }, 6000);
  } catch (e) {
    showMsg("Could not start the photoreal avatar:<br><code>" + (e.message || e) +
      "</code><br><br>Check <code>liveavatarApiKey</code> / <code>liveavatarAvatarId</code> in config.json, then refresh.", false);
  }
})();
</script>
</body>
</html>
